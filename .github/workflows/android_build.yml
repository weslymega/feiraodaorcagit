name: Build Android App Bundle

on:
  push:
    branches: [ "main", "production" ] # Dispara em pushes para estas branches
  workflow_dispatch: # Permite disparar o build manualmente pelo painel do GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'microsoft'
        cache: 'gradle'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Application
      run: npm run build
      env:
        # Inserir aqui variáveis de ambiente se necessárias para o build do Vite
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Decode Keystore (Se necessário)
      # Se a keystore já estiver no repositório, este passo não é preciso.
      run: echo "Keystore já está no repositório em feiraodaorca.keystore"

    - name: Build Android App Bundle (.aab)
      working-directory: android
      run: ./gradlew bundleRelease
      env:
        # Passar os privilégios se não estiverem hardcoded no build.gradle
        ANDROID_SDK_ROOT: $ANDROID_HOME

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-bundle
        path: android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 7
